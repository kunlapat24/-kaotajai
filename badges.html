<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>เหรียญของฉัน — ก้าวท้าใจ สสอ.บ้านนา</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing:border-box; }
    body { margin:0; padding:0 0 50px; font-family:'Sarabun',sans-serif;
      background: radial-gradient(circle at 20% 0%, #c8f5cf 0%, #e8f5e9 35%, #ffffff 100%);
      min-height:100vh; color:#1b3a1f; }
    .wrap { width:94%; max-width:440px; margin:0 auto; padding-top:18px; }
    .glass { background: rgba(255,255,255,.55); backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%); border:1px solid rgba(255,255,255,.9);
      box-shadow: 0 8px 28px rgba(46,125,50,.10), inset 0 1px 0 rgba(255,255,255,.6); border-radius:22px; }
    .head { text-align:center; padding:18px 16px; margin-bottom:14px; }
    .head h2 { margin:0; font-size:1.3rem; font-weight:700; color:#1b5e20; }
    .stats { display:flex; gap:10px; margin-bottom:16px; }
    .stats .item { flex:1; text-align:center; padding:14px 6px; }
    .stats .num { font-size:1.35rem; font-weight:700; color:#1b5e20; }
    .stats .lbl { font-size:.7rem; color:#3a7d44; margin-top:2px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .badge { padding:18px 10px; text-align:center; border-radius:18px; position:relative; }
    .badge.earned { background: linear-gradient(160deg, rgba(255,255,255,.75), rgba(200,245,201,.55));
      border:1px solid rgba(255,255,255,.9); box-shadow:0 8px 22px rgba(46,125,50,.18); }
    .badge.locked { background: rgba(0,0,0,.03); border:1px solid rgba(0,0,0,.05); opacity:.55; }
    .badge .icon { font-size:2.2rem; line-height:1; filter: grayscale(0); }
    .badge.locked .icon { filter: grayscale(1); }
    .badge .lbl { font-weight:700; color:#1b5e20; font-size:.85rem; margin-top:8px; }
    .badge.locked .lbl { color:#777; }
    .badge .desc { font-size:.7rem; color:#3a7d44; margin-top:3px; line-height:1.3; }
    .badge.locked .desc { color:#999; }
    .badge .lockIcon { position:absolute; top:8px; right:10px; font-size:.85rem; opacity:.6; }
    .msg { text-align:center; color:#1b5e20; font-weight:600; padding:34px 10px; line-height:1.6; }
    .back { width:100%; padding:13px; margin-top:16px; border:1px solid rgba(67,160,71,.4);
      color:#1b5e20; font-weight:600; font-family:'Sarabun',sans-serif; cursor:pointer;
      background: rgba(255,255,255,.55); border-radius:18px; }
  </style>
</head>
<body>
  <div class="wrap" id="app"><div class="glass msg">กำลังโหลดเหรียญของคุณ...</div></div>

  <script>
    const LIFF_ID = "2010554592-DhNLOLm1";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwpgOdF1RxQOCpzFUCiAKklZACeGrdIUsFwUZS7zOq3JmBxAgNSPEpwNLJLho2VFyfu2A/exec";

    let accessToken = "";

    async function api(action, payload, _isRetry) {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), _isRetry ? 25000 : 12000);
      try {
        const res = await fetch(GAS_URL, {
          method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(Object.assign({ action, accessToken }, payload || {})),
          redirect: "follow", signal: ctrl.signal
        });
        const text = await res.text();
        try { return JSON.parse(text); }
        catch (e) { throw new Error("เซิร์ฟเวอร์ตอบกลับไม่ถูกต้อง (ไม่ใช่ JSON)"); }
      } catch (err) {
        if (err.name === "AbortError" && !_isRetry) return api(action, payload, true);
        if (err.name === "AbortError") throw new Error("เซิร์ฟเวอร์ตอบช้าผิดปกติ กรุณาลองใหม่อีกครั้งใน 1 นาที");
        throw err;
      } finally { clearTimeout(timer); }
    }

    async function main() {
      const app = document.getElementById("app");
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        accessToken = liff.getAccessToken();
        const r = await api("getBadges");
        if (!r.ok) throw new Error(r.message || "โหลดไม่สำเร็จ");
        render(r);
      } catch (err) {
        app.innerHTML = `<div class="glass msg" style="color:#c62828;">❌ ${err.message}
          <br><button class="back" onclick="main()">ลองใหม่</button></div>`;
      }
    }

    function render(data) {
      const app = document.getElementById("app");
      const s = data.stats;
      const cards = data.badges.map(b => `
        <div class="badge ${b.earned ? "earned" : "locked"}">
          ${!b.earned ? `<div class="lockIcon">🔒</div>` : ""}
          <div class="icon">${b.icon}</div>
          <div class="lbl">${b.label}</div>
          <div class="desc">${badgeDesc(b.key)}</div>
        </div>`).join("");

      app.innerHTML = `
        <div class="glass head"><h2>🎖️ เหรียญของฉัน</h2></div>
        <div class="glass stats">
          <div class="item"><div class="num">${s.totalApprovedDays}</div><div class="lbl">วันที่อนุมัติ</div></div>
          <div class="item"><div class="num">${s.maxStreak}</div><div class="lbl">สตรีคสูงสุด (วัน)</div></div>
          <div class="item"><div class="num">${s.totalApprovedSteps.toLocaleString()}</div><div class="lbl">ก้าวสะสม</div></div>
        </div>
        <div class="grid">${cards}</div>
        <button class="back" onclick="location.href='https://liff.line.me/${LIFF_ID}'">← กลับหน้าส่งผล</button>`;
    }

    function badgeDesc(key) {
      const map = {
        first: "ส่งผลและได้รับอนุมัติครั้งแรก",
        streak7: "เดินต่อเนื่อง 7 วัน",
        streak14: "เดินต่อเนื่อง 14 วัน",
        streak30: "เดินต่อเนื่อง 30 วัน",
        days30: "มีวันที่อนุมัติรวม 30 วัน",
        steps50k: "สะสมก้าวที่อนุมัติครบ 50,000",
        steps100k: "สะสมก้าวที่อนุมัติครบ 100,000"
      };
      return map[key] || "";
    }

    window.onload = main;
  </script>
</body>
</html>
