<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ก้าวท้าใจ สสอ.บ้านนา</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { margin:0; padding:0 0 40px; font-family:'Sarabun',sans-serif;
      background:linear-gradient(135deg,#e8f5e9 0%,#81c784 100%); min-height:100vh;
      display:flex; justify-content:center; align-items:flex-start; }
    .container { width:95%; max-width:400px; margin:20px auto; }
    .banner { width:100%; height:auto; border-radius:20px 20px 0 0; display:block; box-shadow:0 10px 30px rgba(0,0,0,.1); }
    .glass-card { background:rgba(255,255,255,.4); backdrop-filter:blur(15px); -webkit-backdrop-filter:blur(15px);
      border:1px solid rgba(255,255,255,.6); border-radius:0 0 20px 20px; padding:30px 20px 20px; text-align:center;
      box-shadow:0 8px 32px rgba(0,0,0,.1); }
    .profile-img { width:80px; height:80px; border-radius:50%; border:3px solid #fff; box-shadow:0 4px 15px rgba(0,0,0,.1);
      margin-top:-50px; background:#fff; object-fit:cover; }
    h3 { color:#1b5e20; margin:10px 0 5px; font-size:1.3rem; font-weight:600; }
    .status-text { color:#2e7d32; font-size:.9rem; margin-bottom:15px; }
    .form-group { text-align:left; margin-bottom:15px; }
    label { display:block; color:#1b5e20; font-weight:600; font-size:.9rem; margin-bottom:5px; margin-left:5px; }
    input,select { width:100%; box-sizing:border-box; padding:12px 15px; border-radius:12px;
      border:1px solid rgba(255,255,255,.8); background:rgba(255,255,255,.6); color:#333;
      font-family:'Sarabun',sans-serif; font-size:1rem; outline:none; transition:all .3s; box-shadow:inset 0 2px 4px rgba(0,0,0,.02); }
    input:focus,select:focus { background:rgba(255,255,255,.9); border-color:#81c784; box-shadow:0 0 8px rgba(129,199,132,.4); }
    input:disabled { background:rgba(232,245,233,.6); color:#2e7d32; font-weight:bold; }
    .row-flex { display:flex; gap:10px; } .row-flex .form-group { flex:1; }
    .btn-submit { width:100%; background:linear-gradient(135deg,#66bb6a 0%,#43a047 100%); border:none; color:#fff;
      padding:14px; border-radius:12px; font-size:1.1rem; font-weight:bold; font-family:'Sarabun',sans-serif;
      cursor:pointer; margin-top:10px; box-shadow:0 4px 15px rgba(76,175,80,.3); transition:all .3s; }
    .btn-submit:hover { transform:translateY(-2px); }
    .btn-submit:disabled { background:#a5d6a7; cursor:not-allowed; transform:none; }
    .btn-ghost { width:100%; background:rgba(255,255,255,.6); color:#1b5e20; border:1px solid #81c784;
      padding:12px; border-radius:12px; font-size:1rem; font-weight:600; font-family:'Sarabun',sans-serif;
      cursor:pointer; margin-top:10px; }
    #loading { text-align:center; font-size:1rem; color:#1b5e20; line-height:1.6; font-weight:bold; }
    .preview { width:100%; max-height:220px; object-fit:contain; border-radius:12px; margin-top:8px; display:none;
      border:1px solid rgba(255,255,255,.8); background:rgba(255,255,255,.4); }
    .badge { display:inline-block; padding:8px 14px; border-radius:20px; font-weight:bold; font-size:.95rem; }
    .badge.pending { background:#fff8e1; color:#f57f17; } .badge.ok { background:#e8f5e9; color:#2e7d32; }
    .badge.no { background:#ffebee; color:#c62828; }
    .file-label { display:block; padding:14px; border:2px dashed #81c784; border-radius:12px; color:#2e7d32;
      background:rgba(255,255,255,.4); cursor:pointer; font-weight:600; }
    input[type=file] { display:none; }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://drive.google.com/thumbnail?id=1zxwAt7-unumDFue3Lq4RavQ73N66p0j6&sz=w1000" alt="Banner" class="banner">
    <div class="glass-card" id="cardContent">
      <div id="loading">กำลังโหลดข้อมูลจาก LINE...<br><span style="font-size:.8rem;color:#666;">(รอสักครู่)</span></div>
    </div>
  </div>

  <script>
    /* ====== ตั้งค่า 2 จุด ====== */
    const LIFF_ID = "2010554592-DhNLOLm1";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyNwQPmD3OUr00NEmYBfRnPQNr2GxMD0gXN3sQcIDIEPOcB303YmdnTOgj5Mxspy6hBkg/exec";
    /* ========================== */

    let profile = null, accessToken = "";

    async function api(action, payload) {
      const res = await fetch(GAS_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(Object.assign({ action, accessToken }, payload || {})),
        redirect: "follow"
      });
      return res.json();
    }

    async function main() {
      const box = document.getElementById("loading");
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        profile = await liff.getProfile();
        accessToken = liff.getAccessToken();
        const st = await api("getStatus");
        if (!st.ok) throw new Error(st.message || "โหลดสถานะไม่สำเร็จ");
        st.registered ? renderSteps(st) : renderRegister();
      } catch (err) {
        box.innerHTML = `<div style="background:#ffebee;border:1px solid #c62828;color:#c62828;padding:15px;border-radius:8px;">
          ❌ <b>เกิดข้อผิดพลาด</b><br><span style="font-size:.9rem;">${err.message}</span></div>`;
      }
    }

    /* ---------- ฟอร์มลงทะเบียน ---------- */
    function renderRegister() {
      document.getElementById("cardContent").innerHTML = `
        <img src="${profile.pictureUrl}" class="profile-img">
        <h3>ก้าวท้าใจ สสอ.บ้านนา</h3>
        <p class="status-text">สวัสดีคุณ <strong>${profile.displayName}</strong><br>กรุณากรอกข้อมูลเพื่อลงทะเบียน</p>
        <form id="regForm">
          <div class="row-flex">
            <div class="form-group"><label>น้ำหนัก (กก.)</label><input type="number" id="weight" step="0.1" required oninput="calcBMI()"></div>
            <div class="form-group"><label>ส่วนสูง (ซม.)</label><input type="number" id="height" required oninput="calcBMI()"></div>
          </div>
          <div class="form-group"><label>BMI (ดัชนีมวลกาย)</label><input type="text" id="bmi" placeholder="คำนวณอัตโนมัติ" disabled></div>
          <div class="form-group"><label>สถานที่ทำงาน</label>
            <select id="workplace" required>
              <option value="" disabled selected>-- เลือกหน่วยงาน --</option>
              <option value="โรงพยาบาลส่งเสริมสุขภาพตำบล บ้านบางอ้อ">รพ.สต. บ้านบางอ้อ</option>
              <option value="โรงพยาบาลส่งเสริมสุขภาพตำบล บ้านละว้า">รพ.สต. บ้านละว้า</option>
              <option value="โรงพยาบาลส่งเสริมสุขภาพตำบล บ้านหนองรี">รพ.สต. บ้านหนองรี</option>
              <option value="โรงพยาบาลส่งเสริมสุขภาพตำบล บ้านแหลมไม้ย้อย">รพ.สต. บ้านแหลมไม้ย้อย</option>
              <option value="โรงพยาบาลส่งเสริมสุขภาพตำบล บ้านหนองคันจาม">รพ.สต. บ้านหนองคันจาม</option>
              <option value="โรงพยาบาลส่งเสริมสุขภาพตำบล บ้านพริก">รพ.สต. บ้านพริก</option>
              <option value="โรงพยาบาลส่งเสริมสุขภาพตำบล บ้านทองหลาง">รพ.สต. บ้านทองหลาง</option>
              <option value="โรงพยาบาลส่งเสริมสุขภาพตำบล บ้านไผ่ขวาง">รพ.สต. บ้านไผ่ขวาง</option>
              <option value="โรงพยาบาลส่งเสริมสุขภาพตำบล บ้านกร่างประตูวัง">รพ.สต. บ้านกร่างประตูวัง</option>
              <option value="โรงพยาบาลส่งเสริมสุขภาพตำบล บ้านคลองสามสิบ">รพ.สต. บ้านคลองสามสิบ</option>
              <option value="โรงพยาบาลส่งเสริมสุขภาพตำบล บ้านกะเหรี่ยง">รพ.สต. บ้านกะเหรี่ยง</option>
              <option value="โรงพยาบาลส่งเสริมสุขภาพตำบล บ้านเขาน้อย">รพ.สต. บ้านเขาน้อย</option>
              <option value="โรงพยาบาลส่งเสริมสุขภาพตำบล บ้านเขาเพิ่ม">รพ.สต. บ้านเขาเพิ่ม</option>
              <option value="โรงพยาบาลส่งเสริมสุขภาพตำบล บ้านทางกระบือ">รพ.สต. บ้านทางกระบือ</option>
              <option value="สาธารณสุขอำเภอบ้านนา">สาธารณสุขอำเภอบ้านนา (สสอ.)</option>
            </select>
          </div>
          <button type="submit" id="btnReg" class="btn-submit">ยืนยันการลงทะเบียน</button>
        </form>`;
      document.getElementById("regForm").addEventListener("submit", doRegister);
    }
    function calcBMI() {
      const w = parseFloat(document.getElementById("weight").value),
            h = parseFloat(document.getElementById("height").value), b = document.getElementById("bmi");
      b.value = (w > 0 && h > 0) ? (w / Math.pow(h/100,2)).toFixed(2) : "";
    }
    async function doRegister(e) {
      e.preventDefault();
      const btn = document.getElementById("btnReg"); btn.disabled = true; btn.innerText = "กำลังบันทึก...";
      const r = await api("register", {
        weight: document.getElementById("weight").value,
        height: document.getElementById("height").value,
        bmi: document.getElementById("bmi").value,
        workplace: document.getElementById("workplace").value
      });
      if (!r.ok) { alert(r.message); btn.disabled = false; btn.innerText = "ยืนยันการลงทะเบียน"; return; }
      const st = await api("getStatus"); renderSteps(st);
    }

    /* ---------- ฟอร์มส่งผลก้าว ---------- */
    function statusBadge(sub, label) {
      if (!sub) return "";
      let cls = "pending";
      if (sub.status === "อนุมัติ") cls = "ok";
      if (sub.status === "ไม่อนุมัติ") cls = "no";
      const hint = sub.status === "ไม่อนุมัติ" ? " (ส่งใหม่ได้)" : "";
      return `<div style="margin-bottom:12px;"><span class="badge ${cls}">${label}: ${Number(sub.steps).toLocaleString()} ก้าว — ${sub.status}${hint}</span></div>`;
    }

    function renderSteps(st) {
      const adminBtn = st.isAdmin ? `<a href="./admin.html"><button type="button" class="btn-ghost">🛡️ ไปหน้าแอดมิน</button></a>` : "";
      document.getElementById("cardContent").innerHTML = `
        <img src="${profile.pictureUrl}" class="profile-img">
        <h3>ส่งผลก้าว</h3>
        <p class="status-text">สวัสดีคุณ <strong>${st.profile.displayName}</strong><br>${st.profile.workplace || ""}</p>
        <div id="dateBanner">${statusBadge(st.todaySubmission, "วันนี้")}</div>
        <form id="stepForm">
          <div class="form-group"><label>วันที่เดิน</label>
            <input type="date" id="walkDate" value="${st.today}" max="${st.today}" required></div>
          <div class="form-group"><label>จำนวนก้าว</label>
            <input type="number" id="steps" min="1" placeholder="เช่น 8500" required></div>
          <div class="form-group"><label>รูปหลักฐาน (แคปจากแอปนับก้าว)</label>
            <label class="file-label" for="photo">📷 แตะเพื่อเลือก/ถ่ายรูป</label>
            <input type="file" id="photo" accept="image/*" capture="environment" required onchange="previewPhoto()">
            <img id="preview" class="preview"></div>
          <button type="submit" id="btnStep" class="btn-submit">ส่งผลก้าว</button>
        </form>
        <a href="./leaderboard.html"><button type="button" class="btn-ghost">🏆 ดู Leaderboard</button></a>
        ${adminBtn}`;
      document.getElementById("stepForm").addEventListener("submit", doSubmitSteps);
      document.getElementById("walkDate").addEventListener("change", onDateChange);
    }

    // เลือกวันที่ -> เช็คผลของวันนั้น (อิงจาก userId) โดยไม่กินโควต้า push
    async function onDateChange(e) {
      const date = e.target.value, banner = document.getElementById("dateBanner");
      if (!date) { banner.innerHTML = ""; return; }
      banner.innerHTML = `<div style="color:#777;font-size:.85rem;margin-bottom:12px;">กำลังเช็คผลของวันที่เลือก...</div>`;
      try {
        const r = await api("getDateStatus", { date });
        const label = (date === e.target.max) ? "วันนี้" : date;
        banner.innerHTML = r.submission ? statusBadge(r.submission, label)
          : `<div style="color:#2e7d32;font-size:.85rem;margin-bottom:12px;">วันที่ ${label}: ยังไม่ได้ส่งผล</div>`;
      } catch (err) { banner.innerHTML = ""; }
    }
    function previewPhoto() {
      const f = document.getElementById("photo").files[0], img = document.getElementById("preview");
      if (!f) { img.style.display = "none"; return; }
      img.src = URL.createObjectURL(f); img.style.display = "block";
    }
    function resizeImage(file, maxW) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const im = new Image();
          im.onload = () => {
            const scale = Math.min(1, maxW / im.width);
            const w = Math.round(im.width * scale), h = Math.round(im.height * scale);
            const c = document.createElement("canvas"); c.width = w; c.height = h;
            c.getContext("2d").drawImage(im, 0, 0, w, h);
            resolve(c.toDataURL("image/jpeg", 0.7));
          };
          im.onerror = reject; im.src = reader.result;
        };
        reader.onerror = reject; reader.readAsDataURL(file);
      });
    }
    async function doSubmitSteps(e) {
      e.preventDefault();
      const btn = document.getElementById("btnStep"); btn.disabled = true; btn.innerText = "กำลังส่ง...";
      try {
        const f = document.getElementById("photo").files[0];
        const photoBase64 = f ? await resizeImage(f, 1000) : "";
        const r = await api("submitSteps", {
          date: document.getElementById("walkDate").value,
          steps: document.getElementById("steps").value,
          photoBase64
        });
        if (!r.ok) throw new Error(r.message);
        document.getElementById("cardContent").innerHTML = `
          <img src="${profile.pictureUrl}" class="profile-img">
          <h3>ส่งผลสำเร็จ</h3>
          <div style="padding:20px 0;"><p style="color:#2e7d32;font-weight:bold;font-size:1.1rem;">${r.message}</p></div>
          <button class="btn-submit" onclick="liff.closeWindow()">กลับสู่หน้าแชท</button>`;
      } catch (err) {
        alert("ส่งไม่สำเร็จ: " + err.message); btn.disabled = false; btn.innerText = "ส่งผลก้าว";
      }
    }

    window.onload = main;
  </script>
</body>
</html>
