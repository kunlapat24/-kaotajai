<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Leaderboard — ก้าวท้าใจ สสอ.บ้านนา</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin:0; padding:0 0 50px; font-family:'Sarabun',sans-serif;
      background: radial-gradient(circle at 20% 0%, #c8f5cf 0%, #e8f5e9 35%, #ffffff 100%);
      min-height:100vh; color:#1b3a1f;
    }
    .wrap { width:94%; max-width:440px; margin:0 auto; padding-top:18px; }

    /* ---------- Liquid Glass base ---------- */
    .glass {
      background: rgba(255,255,255,.55);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      border: 1px solid rgba(255,255,255,.9);
      box-shadow: 0 8px 28px rgba(46,125,50,.10), inset 0 1px 0 rgba(255,255,255,.6);
      border-radius: 22px;
    }

    .head { text-align:center; padding:18px 16px; margin-bottom:14px; }
    .head h2 { margin:0; font-size:1.35rem; font-weight:700; color:#1b5e20; letter-spacing:.2px; }
    .head .sub { font-size:.8rem; color:#3a7d44; margin-top:4px; }

    /* ---------- การ์ดของฉัน ---------- */
    .me {
      position: relative; overflow:hidden;
      padding:18px; margin-bottom:16px; text-align:center;
      background: linear-gradient(135deg, rgba(102,187,106,.92), rgba(46,125,50,.92));
      border: 1px solid rgba(255,255,255,.55);
      box-shadow: 0 10px 30px rgba(46,125,50,.28), inset 0 1px 0 rgba(255,255,255,.4);
      border-radius: 22px; color:#fff;
    }
    .me::after {
      content:""; position:absolute; inset:0;
      background: radial-gradient(circle at 80% -10%, rgba(255,255,255,.35), transparent 60%);
    }
    .me .rankNum { font-size:2.1rem; font-weight:700; line-height:1; }
    .me .rankLbl { font-size:.78rem; opacity:.9; margin-top:2px; }
    .me .name { font-weight:600; margin-top:8px; font-size:1rem; }
    .me .total { font-size:.85rem; opacity:.95; margin-top:2px; }

    /* ---------- แท็บ ---------- */
    .tabs { display:flex; gap:8px; margin-bottom:16px; padding:5px; border-radius:18px;
      background: rgba(255,255,255,.45); border:1px solid rgba(255,255,255,.8); }
    .tab { flex:1; padding:10px; border-radius:14px; border:none; background:transparent;
      color:#2e7d32; font-weight:600; font-family:'Sarabun',sans-serif; cursor:pointer; font-size:.92rem;
      transition: all .25s; }
    .tab.active { background: linear-gradient(135deg,#66bb6a,#2e7d32); color:#fff;
      box-shadow: 0 4px 14px rgba(46,125,50,.35); }

    /* ---------- Top 5 podium ---------- */
    .chart { padding:18px 16px 8px; }
    .chart .bar-row { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
    .chart .bar-row:last-child { margin-bottom:4px; }
    .chart .rk { width:22px; flex:none; font-weight:700; color:#1b5e20; font-size:.85rem; text-align:center; }
    .chart .av { width:38px; height:38px; border-radius:50%; object-fit:cover; flex:none;
      border:2px solid #fff; box-shadow:0 3px 8px rgba(0,0,0,.15); background:#e8f5e9; }
    .chart .av.rk1 { width:46px; height:46px; border-color:#ffd54f; }
    .chart .bar-main { flex:1; min-width:0; }
    .chart .bar-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px; }
    .chart .bar-name { font-size:.82rem; font-weight:600; color:#1b5e20; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:62%; }
    .chart .bar-val { font-size:.82rem; font-weight:700; color:#2e7d32; white-space:nowrap; }
    .chart .bar-track { height:14px; border-radius:10px; background:rgba(46,125,50,.10);
      border:1px solid rgba(46,125,50,.12); overflow:hidden; }
    .chart .bar-fill { height:100%; border-radius:10px; min-width:10px;
      background: linear-gradient(90deg, #a5d6a7, #43a047);
      box-shadow: inset 0 1px 2px rgba(255,255,255,.4);
      transition: width 1s cubic-bezier(.22,.9,.25,1); width:0%; }
    .chart .bar-row.rk0 .bar-fill { background: linear-gradient(90deg, #ffe082, #ffb300); }
    .chart .bar-row.rk1 .bar-fill { background: linear-gradient(90deg, #cfd8dc, #90a4ae); }
    .chart .bar-row.rk2 .bar-fill { background: linear-gradient(90deg, #ffccbc, #ff8a65); }

    /* ---------- รายการ ---------- */
    .row { display:flex; align-items:center; gap:10px; padding:11px 14px; margin-bottom:9px; }
    .row.mine { background: linear-gradient(135deg, rgba(102,187,106,.22), rgba(255,255,255,.55));
      border: 1.5px solid #43a047; }
    .pos { width:30px; height:30px; flex:none; border-radius:50%; display:flex; align-items:center;
      justify-content:center; font-weight:700; font-size:.85rem; background:#e8f5e9; color:#2e7d32; }
    .pos.g1 { background:#ffd54f; color:#7a5c00; } .pos.g2 { background:#cfd8dc; color:#37474f; }
    .pos.g3 { background:#ffcc80; color:#7a4a00; }
    .rowAvatar { width:32px; height:32px; border-radius:50%; object-fit:cover; flex:none;
      border:1px solid rgba(0,0,0,.06); background:#e8f5e9; }
    .info { flex:1; min-width:0; }
    .info .nm { color:#1b5e20; font-weight:600; font-size:.92rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .info .meta { color:#5f8a64; font-size:.76rem; }
    .total2 { color:#1b5e20; font-weight:700; font-size:1rem; white-space:nowrap; text-align:right; }
    .total2 span { font-size:.7rem; color:#6b9270; font-weight:400; display:block; }

    .msg { text-align:center; color:#1b5e20; font-weight:600; padding:34px 10px; line-height:1.6; }
    .back { width:100%; padding:13px; margin-top:8px; border:1px solid rgba(67,160,71,.4);
      color:#1b5e20; font-weight:600; font-family:'Sarabun',sans-serif; cursor:pointer;
      background: rgba(255,255,255,.55); border-radius:18px; }

    /* ---------- ตัวกรองช่วงวันที่ ---------- */
    .filter { padding:14px 16px; margin-bottom:14px; }
    .filter .frow { display:flex; gap:8px; margin-bottom:10px; }
    .filter .fgroup { flex:1; }
    .filter .fgroup label { display:block; font-size:.72rem; color:#3a7d44; margin-bottom:3px; font-weight:600; }
    .filter input[type=date] { width:100%; box-sizing:border-box; padding:9px 8px; border-radius:10px;
      border:1px solid rgba(67,160,71,.35); background:rgba(255,255,255,.7); color:#1b3a1f;
      font-family:'Sarabun',sans-serif; font-size:.82rem; }
    .filter .fbtns { display:flex; gap:8px; }
    .filter .fbtn { flex:1; padding:10px; border-radius:12px; border:none; font-weight:700;
      font-family:'Sarabun',sans-serif; cursor:pointer; font-size:.85rem; }
    .filter .fbtn.apply { background:linear-gradient(135deg,#66bb6a,#2e7d32); color:#fff; }
    .filter .fbtn.allday { background:rgba(255,255,255,.7); color:#1b5e20; border:1px solid rgba(67,160,71,.35); }
    .filter .frangeLabel { text-align:center; font-size:.78rem; color:#2e7d32; margin-top:8px; font-weight:600; }

    /* ---------- ยอดรวมของทุกคน ---------- */
    .community {
      position:relative; overflow:hidden; padding:18px; margin-bottom:16px; text-align:center;
      background: linear-gradient(135deg, rgba(67,160,71,.16), rgba(255,255,255,.55));
      border:1px solid rgba(67,160,71,.3); border-radius:22px;
    }
    .community .icon { font-size:1.6rem; }
    .community .num { font-size:1.9rem; font-weight:700; color:#1b5e20; line-height:1.3; }
    .community .lbl { font-size:.8rem; color:#2e7d32; }
  </style>
</head>
<body>
  <div class="wrap" id="app"><div class="glass msg">กำลังโหลด Leaderboard...</div></div>

  <script>
    /* ====== ใช้ค่าเดียวกับหน้าอื่น ====== */
    const LIFF_ID = "2010554592-DhNLOLm1";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwpgOdF1RxQOCpzFUCiAKklZACeGrdIUsFwUZS7zOq3JmBxAgNSPEpwNLJLho2VFyfu2A/exec";
    /* ==================================== */

    let accessToken = "", myUserId = "", data = null, tab = "individuals";
    let filterStart = "", filterEnd = ""; // ค่าตัวกรองช่วงวันที่ปัจจุบัน (ว่าง = ทุกวัน)

    async function api(action, payload, _isRetry) {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), _isRetry ? 25000 : 12000);
      try {
        const res = await fetch(GAS_URL, {
          method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(Object.assign({ action, accessToken }, payload || {})),
          redirect: "follow", signal: ctrl.signal
        });
        const text = await res.text();
        try { return JSON.parse(text); }
        catch (e) { throw new Error("เซิร์ฟเวอร์ตอบกลับไม่ถูกต้อง: " + text.slice(0, 120)); }
      } catch (err) {
        if (err.name === "AbortError" && !_isRetry) return api(action, payload, true);
        if (err.name === "AbortError") throw new Error("เซิร์ฟเวอร์ตอบช้าผิดปกติ กรุณาลองใหม่อีกครั้งใน 1 นาที");
        throw err;
      } finally { clearTimeout(timer); }
    }

    async function main() {
      const app = document.getElementById("app");
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const p = await liff.getProfile(); myUserId = p.userId;
        accessToken = liff.getAccessToken();
        await loadLeaderboard();
      } catch (err) {
        app.innerHTML = `<div class="glass msg" style="color:#c62828;">❌ ${err.message}
          <br><button class="back" style="margin-top:14px;" onclick="main()">ลองใหม่</button></div>`;
      }
    }

    async function loadLeaderboard() {
      const app = document.getElementById("app");
      app.innerHTML = `<div class="glass msg">กำลังโหลด Leaderboard...</div>`;
      try {
        const payload = {};
        if (filterStart) payload.startDate = filterStart;
        if (filterEnd) payload.endDate = filterEnd;
        data = await api("leaderboard", payload);
        if (!data.ok) throw new Error(data.message || "โหลดไม่สำเร็จ");
        render();
      } catch (err) {
        app.innerHTML = `<div class="glass msg" style="color:#c62828;">❌ ${err.message}
          <br><button class="back" style="margin-top:14px;" onclick="loadLeaderboard()">ลองใหม่</button></div>`;
      }
    }

    function applyFilter() {
      const s = document.getElementById("fStart").value;
      const e = document.getElementById("fEnd").value;
      if (!s && !e) { alert("กรุณาเลือกวันที่อย่างน้อย 1 ช่อง"); return; }
      filterStart = s || e; // ถ้าใส่ช่องเดียว ถือเป็นวันเดียว
      filterEnd = e || s;
      loadLeaderboard();
    }
    function resetFilter() {
      filterStart = ""; filterEnd = "";
      document.getElementById("fStart").value = "";
      document.getElementById("fEnd").value = "";
      loadLeaderboard();
    }

    function medal(i) { return i === 0 ? "g1" : i === 1 ? "g2" : i === 2 ? "g3" : ""; }
    function fmt(n) { return Number(n || 0).toLocaleString(); }
    function medalIcon(i) { return i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : ""; }

    function avatarOf(it, sizeClass) {
      return it.picture
        ? `<img class="${sizeClass}" src="${it.picture}">`
        : `<div class="${sizeClass}" style="display:flex;align-items:center;justify-content:center;color:#2e7d32;font-weight:700;">${(it.name||"?").charAt(0)}</div>`;
    }

    function backBtn() {
      return `<button class="back" onclick="location.href='https://liff.line.me/${LIFF_ID}'">← กลับหน้าส่งผล</button>`;
    }

    function rangeLabel() {
      if (!filterStart && !filterEnd) return "📊 แสดงผลรวมทุกวัน";
      if (filterStart === filterEnd) return "📅 แสดงผลเฉพาะวันที่ " + filterStart;
      return "📅 แสดงผลช่วงวันที่ " + filterStart + " ถึง " + filterEnd;
    }

    function render() {
      const app = document.getElementById("app");
      const filterBar = `<div class="glass filter">
          <div class="frow">
            <div class="fgroup"><label>จากวันที่</label><input type="date" id="fStart" value="${filterStart}"></div>
            <div class="fgroup"><label>ถึงวันที่</label><input type="date" id="fEnd" value="${filterEnd}"></div>
          </div>
          <div class="fbtns">
            <button class="fbtn apply" onclick="applyFilter()">กรองช่วงนี้</button>
            <button class="fbtn allday" onclick="resetFilter()">ทุกวัน</button>
          </div>
          <div class="frangeLabel">${rangeLabel()}</div>
        </div>`;

      const communityCard = `<div class="glass community">
          <div class="icon">🚶‍♂️🚶‍♀️</div>
          <div class="num">${fmt(data.communityTotal)} ก้าว</div>
          <div class="lbl">รวมก้าวของผู้เข้าร่วมทั้งหมด ${fmt(data.participantCount)} คน</div>
        </div>`;

      const meCard = `<div class="me">
          <div class="rankNum">${data.me.rank > 0 ? "#" + data.me.rank : "—"}</div>
          <div class="rankLbl">${data.me.rank > 0 ? "อันดับของคุณ" : "ยังไม่มีอันดับ (ต้องมีผลที่อนุมัติก่อน)"}</div>
          <div class="name">${data.me.name}</div>
          <div class="total">รวม ${fmt(data.me.total)} ก้าว (เฉพาะที่อนุมัติแล้ว)</div>
        </div>`;

      let top5 = "", list = "";
      if (tab === "individuals") {
        const arr = data.individuals || [];
        const top = arr.slice(0, 5);
        const maxVal = top.length ? top[0].total : 1; // อันดับ 1 = 100% เทียบสัดส่วนกับคนอื่น
        top5 = top.length ? `<div class="glass chart">${top.map((it, i) => {
          const pct = Math.max(6, Math.round((it.total / maxVal) * 100)); // ขั้นต่ำ 6% ให้เห็นแท่ง
          return `<div class="bar-row rk${i}">
              <div class="rk">${i + 1}</div>
              ${avatarOf(it, "av" + (i === 0 ? " rk1" : ""))}
              <div class="bar-main">
                <div class="bar-top"><span class="bar-name">${it.name}</span><span class="bar-val">${fmt(it.total)} ก้าว</span></div>
                <div class="bar-track"><div class="bar-fill" data-pct="${pct}" style="width:0%"></div></div>
              </div>
            </div>`;
        }).join("")}</div>` : "";

        list = arr.length ? arr.map((it, i) => `
          <div class="glass row ${it.userId === myUserId ? "mine" : ""}">
            <div class="pos ${medal(i)}">${i + 1}</div>
            ${avatarOf(it, "rowAvatar")}
            <div class="info"><div class="nm">${it.name}${it.userId === myUserId ? " (คุณ)" : ""}</div>
              <div class="meta">${it.days} วันที่อนุมัติ</div></div>
            <div class="total2">${fmt(it.total)}<span>ก้าว</span></div>
          </div>`).join("") : `<div class="glass msg">ยังไม่มีผลที่อนุมัติ</div>`;
      } else {
        const arr = data.teams || [];
        list = arr.length ? arr.map((it, i) => `
          <div class="glass row">
            <div class="pos ${medal(i)}">${i + 1}</div>
            <div class="info"><div class="nm">${it.place}</div><div class="meta">${it.members} คน</div></div>
            <div class="total2">${fmt(it.total)}<span>ก้าว</span></div>
          </div>`).join("") : `<div class="glass msg">ยังไม่มีผลที่อนุมัติ</div>`;
      }

      app.innerHTML = `
        <div class="glass head"><h2>🏆 Leaderboard</h2><div class="sub">ก้าวท้าใจ สสอ.บ้านนา</div></div>
        ${filterBar}
        ${communityCard}
        ${meCard}
        ${top5}
        <div class="tabs">
          <button class="tab ${tab === "individuals" ? "active" : ""}" onclick="switchTab('individuals')">รายบุคคล</button>
          <button class="tab ${tab === "teams" ? "active" : ""}" onclick="switchTab('teams')">หน่วยงาน</button>
        </div>
        ${list}
        ${backBtn()}`;

      // อนิเมชันแท่งกราฟ: ตั้ง width จริงหลัง paint รอบแรก ให้เห็นแท่งวิ่งขึ้น
      requestAnimationFrame(() => requestAnimationFrame(() => {
        document.querySelectorAll(".bar-fill").forEach(el => { el.style.width = el.dataset.pct + "%"; });
      }));
    }

    function switchTab(t) { tab = t; render(); }
    window.onload = main;
  </script>
</body>
</html>
