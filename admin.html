<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>แอดมิน — ก้าวท้าใจ สสอ.บ้านนา</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { margin:0; padding:0 0 40px; font-family:'Sarabun',sans-serif;
      background:linear-gradient(135deg,#e8f5e9 0%,#81c784 100%); min-height:100vh; }
    .wrap { width:95%; max-width:440px; margin:0 auto; padding-top:18px; }
    .head { background:rgba(255,255,255,.55); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,.6);
      border-radius:16px; padding:16px; text-align:center; box-shadow:0 8px 24px rgba(0,0,0,.08); margin-bottom:14px; }
    .head h2 { color:#1b5e20; margin:0 0 4px; font-size:1.25rem; }
    .head p { color:#2e7d32; margin:0; font-size:.85rem; }
    .count { display:inline-block; margin-top:6px; background:#fff8e1; color:#f57f17; font-weight:bold;
      padding:4px 12px; border-radius:20px; font-size:.85rem; }
    .card { background:rgba(255,255,255,.6); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,.7);
      border-radius:16px; padding:16px; margin-bottom:14px; box-shadow:0 6px 18px rgba(0,0,0,.08); }
    .card .name { color:#1b5e20; font-weight:600; font-size:1.05rem; }
    .card .meta { color:#555; font-size:.85rem; margin:2px 0 8px; }
    .steps-big { color:#2e7d32; font-weight:bold; font-size:1.6rem; margin:4px 0; }
    .proof { width:100%; max-height:300px; object-fit:contain; border-radius:12px; background:#fff; cursor:pointer;
      border:1px solid rgba(0,0,0,.06); }
    .row { display:flex; gap:10px; margin-top:12px; }
    .btn { flex:1; border:none; padding:12px; border-radius:12px; font-weight:bold; font-size:1rem;
      font-family:'Sarabun',sans-serif; cursor:pointer; color:#fff; }
    .ok { background:linear-gradient(135deg,#66bb6a,#43a047); }
    .no { background:linear-gradient(135deg,#ef5350,#e53935); }
    .btn:disabled { opacity:.5; cursor:not-allowed; }
    .msg { text-align:center; color:#1b5e20; font-weight:bold; padding:30px 10px; line-height:1.6; }
    .refresh { width:100%; background:rgba(255,255,255,.6); color:#1b5e20; border:1px solid #81c784;
      padding:12px; border-radius:12px; font-weight:600; font-family:'Sarabun',sans-serif; cursor:pointer; margin-bottom:14px; }
  </style>
</head>
<body>
  <div class="wrap" id="app">
    <div class="msg">กำลังตรวจสอบสิทธิ์...</div>
  </div>

  <script>
    /* ====== ใช้ค่าเดียวกับ index.html ====== */
    const LIFF_ID = "2010554592-DhNLOLm1";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwpgOdF1RxQOCpzFUCiAKklZACeGrdIUsFwUZS7zOq3JmBxAgNSPEpwNLJLho2VFyfu2A/exec";
    /* ====================================== */

    let accessToken = "";

    async function api(action, payload, _isRetry) {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), _isRetry ? 25000 : 12000);
      try {
        const res = await fetch(GAS_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(Object.assign({ action, accessToken }, payload || {})),
          redirect: "follow",
          signal: ctrl.signal
        });
        const text = await res.text();
        try { return JSON.parse(text); }
        catch (e) { throw new Error("เซิร์ฟเวอร์ตอบกลับไม่ถูกต้อง (ไม่ใช่ JSON)"); }
      } catch (err) {
        if (err.name === "AbortError" && !_isRetry) return api(action, payload, true);
        if (err.name === "AbortError") throw new Error("เซิร์ฟเวอร์ตอบช้าผิดปกติ กรุณาลองใหม่อีกครั้งใน 1 นาที");
        throw err;
      } finally { clearTimeout(timer); }
    }

    async function main() {
      const app = document.getElementById("app");
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        accessToken = liff.getAccessToken();
        await loadList();
      } catch (err) {
        app.innerHTML = `<div class="msg" style="color:#c62828;">❌ ${err.message}</div>`;
      }
    }

    async function loadList() {
      const app = document.getElementById("app");
      app.innerHTML = `<div class="msg">กำลังโหลดรายการ...</div>`;
      const r = await api("adminList");

      if (r.notAdmin) {
        app.innerHTML = `<div class="head"><h2>🛡️ หน้าแอดมิน</h2></div>
          <div class="card"><div class="msg" style="color:#c62828;">คุณไม่มีสิทธิ์เข้าหน้านี้<br>
          <span style="font-weight:400;font-size:.85rem;color:#777;">กรุณาให้ผู้ดูแลเพิ่ม User ID ของคุณในชีต Admins</span></div></div>`;
        return;
      }
      if (!r.ok) { app.innerHTML = `<div class="msg" style="color:#c62828;">${r.message}</div>`; return; }

      let html = `<div class="head"><h2>🛡️ อนุมัติผลก้าว</h2>
        <p>แอดมิน: ${r.admin}</p>
        <div class="count">รออนุมัติ ${r.pending.length} รายการ</div></div>
        <button class="refresh" onclick="loadList()">🔄 รีเฟรช</button>`;

      if (r.pending.length === 0) {
        html += `<div class="card"><div class="msg">🎉 ไม่มีรายการค้างอนุมัติ</div></div>`;
        app.innerHTML = html; return;
      }

      r.pending.forEach(function (it) {
        const proof = it.photo
          ? `<img class="proof" src="${it.photo}" onclick="window.open('${it.photo}','_blank')">`
          : `<div style="color:#999;font-size:.85rem;padding:8px 0;">— ไม่มีรูปหลักฐาน —</div>`;
        html += `
          <div class="card" id="c_${it.id}">
            <div class="name">${it.displayName}</div>
            <div class="meta">${it.workplace || ""} · วันที่ ${it.date}</div>
            <div class="steps-big">${Number(it.steps).toLocaleString()} ก้าว</div>
            ${proof}
            <div class="row">
              <button class="btn ok" onclick="decide('${it.id}','approve',this)">✅ อนุมัติ</button>
              <button class="btn no" onclick="decide('${it.id}','reject',this)">❌ ไม่อนุมัติ</button>
            </div>
          </div>`;
      });
      app.innerHTML = html;
    }

    async function decide(id, decision, btn) {
      let reason = "";
      if (decision === "reject") {
        reason = prompt("กรุณาระบุเหตุผลที่ไม่อนุมัติ:", "");
        if (reason === null) return; // กดยกเลิก
        reason = reason.trim();
        if (!reason) { alert("กรุณาระบุเหตุผลก่อนกดไม่อนุมัติ"); return; }
      }
      const card = document.getElementById("c_" + id);
      card.querySelectorAll("button").forEach(b => b.disabled = true);
      btn.innerText = "กำลังบันทึก...";
      try {
        const r = await api("adminDecide", { id, decision, reason });
        if (!r.ok) throw new Error(r.message || "บันทึกไม่สำเร็จ");
        card.style.transition = "opacity .3s"; card.style.opacity = "0";
        setTimeout(() => { card.remove(); updateCount(); }, 320);
      } catch (err) {
        alert(err.message);
        card.querySelectorAll("button").forEach(b => b.disabled = false);
        btn.innerText = decision === "approve" ? "✅ อนุมัติ" : "❌ ไม่อนุมัติ";
      }
    }

    function updateCount() {
      const remain = document.querySelectorAll(".card").length;
      const c = document.querySelector(".count");
      if (c) c.innerText = "รออนุมัติ " + remain + " รายการ";
      if (remain === 0) {
        const app = document.getElementById("app");
        app.insertAdjacentHTML("beforeend", `<div class="card"><div class="msg">🎉 อนุมัติครบแล้ว</div></div>`);
      }
    }

    window.onload = main;
  </script>
</body>
</html>
